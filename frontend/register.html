<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DocBridge</title>
    <meta name="description" content="Create your DocBridge account to book doctor appointments online.">
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563EB'/><path d='M16 7v18M7 16h18' stroke='white' stroke-width='4' stroke-linecap='round'/></svg>">
    <style>
        .doctor-only { display: none; }
        .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .form-grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="split-layout">
        <div class="split-left">
            <div class="blob" style="width: 400px; height: 400px; background: #60A5FA; top: 10%; left: -10%;"></div>
            <div class="blob" style="width: 300px; height: 300px; background: #818CF8; bottom: 10%; right: 10%;"></div>
            <div class="split-left-inner">
                <h1>Join DocBridge.</h1>
                <p>Connect with top verified medical professionals instantly. Your health is our priority.</p>
                <svg width="100%" height="220" viewBox="0 0 400 280" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-top: 2rem;">
                    <circle cx="200" cy="140" r="110" fill="white" fill-opacity="0.15"/>
                    <rect x="180" y="65" width="40" height="150" rx="10" fill="white" fill-opacity="0.8"/>
                    <rect x="120" y="120" width="160" height="40" rx="10" fill="white" fill-opacity="0.8"/>
                    <circle cx="290" cy="70" r="20" fill="#60A5FA"/>
                    <circle cx="110" cy="210" r="28" fill="#818CF8" fill-opacity="0.7"/>
                </svg>
            </div>
        </div>

        <div class="split-right" style="overflow-y: auto;">
            <div class="auth-box" style="max-width: 460px; padding: 2rem 0;">
                <h2>Create Account</h2>
                <p>Complete your profile to get started</p>
                <form id="registerForm" style="margin-top: 1.5rem;">

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label><i class='bx bx-user' style="color:var(--pat-primary)"></i> Full Name</label>
                            <input type="text" id="fullName" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label><i class='bx bx-envelope' style="color:var(--pat-primary)"></i> Email</label>
                            <input type="email" id="email" required placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label><i class='bx bx-lock-alt' style="color:var(--pat-primary)"></i> Password</label>
                            <input type="password" id="password" required placeholder="Min. 8 characters" minlength="6">
                        </div>
                        <div class="form-group">
                            <label><i class='bx bx-phone' style="color:var(--pat-primary)"></i> Phone Number</label>
                            <input type="tel" id="phone" required placeholder="+91 98765 43210">
                        </div>
                        <div class="form-group">
                            <label><i class='bx bx-id-card' style="color:var(--pat-primary)"></i> Register As</label>
                            <select id="role" onchange="handleRoleChange(this.value)">
                                <option value="patient">Patient</option>
                                <option value="doctor">Doctor</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class='bx bx-male-female' style="color:var(--pat-primary)"></i> Gender</label>
                            <select id="gender">
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class='bx bx-calendar' style="color:var(--pat-primary)"></i> Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>

                    <!-- Doctor-only fields -->
                    <div id="doctorFields" class="doctor-only">
                        <div style="height: 1px; background: var(--gray-200); margin: 0.5rem 0 1.25rem;"></div>
                        <p style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--doc-primary); margin-bottom: 1rem;">
                            <i class='bx bx-user-md'></i> Doctor Details
                        </p>
                        <div class="form-grid-2">
                            <div class="form-group">
                                <label><i class='bx bx-plus-medical' style="color:var(--doc-primary)"></i> Specialty</label>
                                <select id="specialty">
                                    <option value="General Physician">General Physician</option>
                                    <option value="Cardiologist">Cardiologist</option>
                                    <option value="Neurologist">Neurologist</option>
                                    <option value="Dermatologist">Dermatologist</option>
                                    <option value="Orthopedist">Orthopedist</option>
                                    <option value="Gastroenterologist">Gastroenterologist</option>
                                    <option value="Pediatrician">Pediatrician</option>
                                    <option value="Gynecologist">Gynecologist</option>
                                    <option value="Psychiatrist">Psychiatrist</option>
                                    <option value="ENT Specialist">ENT Specialist</option>
                                    <option value="Ophthalmologist">Ophthalmologist</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label><i class='bx bx-medal' style="color:var(--doc-primary)"></i> Years of Experience</label>
                                <select id="experience">
                                    <option value="1 year">1 year</option>
                                    <option value="2 years">2 years</option>
                                    <option value="3 years">3 years</option>
                                    <option value="5 years">5 years</option>
                                    <option value="7 years">7 years</option>
                                    <option value="10 years">10 years</option>
                                    <option value="12 years">12 years</option>
                                    <option value="15 years">15 years</option>
                                    <option value="20+ years">20+ years</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.05rem;">
                        <i class='bx bx-user-plus'></i> Create Account
                    </button>
                    <div id="formMessage" style="text-align: center; margin-top: 1rem; font-weight: 600; display: none;"></div>
                    <p style="text-align: center; margin-top: 1.5rem; color: var(--gray-500);">
                        Already have an account? <a href="login.html" style="color: var(--pat-primary); font-weight: 600; text-decoration: none;">Login here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        function handleRoleChange(role) {
            const doctorFields = document.getElementById('doctorFields');
            const specialty    = document.getElementById('specialty');
            const experience   = document.getElementById('experience');
            if (role === 'doctor') {
                doctorFields.style.display = 'block';
                specialty.required  = true;
                experience.required = true;
            } else {
                doctorFields.style.display = 'none';
                specialty.required  = false;
                experience.required = false;
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const role       = document.getElementById('role').value;
            const submitBtn  = document.getElementById('submitBtn');
            const msgDiv     = document.getElementById('formMessage');

            const data = {
                fullName:   document.getElementById('fullName').value.trim(),
                email:      document.getElementById('email').value.trim(),
                password:   document.getElementById('password').value,
                phone:      document.getElementById('phone').value.trim(),
                role,
                gender:     document.getElementById('gender').value,
                dob:        document.getElementById('dob').value,
            };

            if (role === 'doctor') {
                data.specialty  = document.getElementById('specialty').value;
                data.experience = document.getElementById('experience').value;
            }

            submitBtn.disabled   = true;
            submitBtn.innerHTML  = '<i class="bx bx-loader-alt" style="animation: spin 1s linear infinite;"></i> Creating account...';

            try {
                const response = await fetch('/api/auth/register', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify(data)
                });

                const result = await response.json();
                msgDiv.style.display = 'block';

                if (response.ok) {
                    msgDiv.textContent  = '✓ Registration successful! Redirecting to login...';
                    msgDiv.style.color  = '#059669';
                    setTimeout(() => { window.location.href = 'login.html'; }, 1200);
                } else {
                    msgDiv.textContent = result.error || 'Registration failed. Please try again.';
                    msgDiv.style.color = '#DC2626';
                    submitBtn.disabled  = false;
                    submitBtn.innerHTML = '<i class="bx bx-user-plus"></i> Create Account';
                }
            } catch (err) {
                msgDiv.textContent  = 'Server error. Please ensure the server is running.';
                msgDiv.style.color  = '#DC2626';
                msgDiv.style.display = 'block';
                submitBtn.disabled   = false;
                submitBtn.innerHTML  = '<i class="bx bx-user-plus"></i> Create Account';
            }
        });
    </script>
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</body>
</html>
