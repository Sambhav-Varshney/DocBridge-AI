<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DocBridge</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="split-layout">
        <div class="split-left">
            <div class="blob" style="width: 400px; height: 400px; background: #60A5FA; top: 10%; left: -10%;"></div>
            <div class="blob" style="width: 300px; height: 300px; background: #818CF8; bottom: 10%; right: 10%;"></div>
            <div class="split-left-inner">
                <h1>Join DocBridge.</h1>
                <p>Connect with top medical verified professionals instantly. Your health is our priority.</p>
                <svg width="100%" height="250" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-top: 2rem;">
                    <!-- Simple abstract medical cross wrapper -->
                    <circle cx="200" cy="150" r="120" fill="white" fill-opacity="0.2"/>
                    <rect x="180" y="70" width="40" height="160" rx="10" fill="white" fill-opacity="0.8"/>
                    <rect x="120" y="130" width="160" height="40" rx="10" fill="white" fill-opacity="0.8"/>
                    <circle cx="280" cy="80" r="20" fill="#60A5FA"/>
                    <circle cx="120" cy="220" r="30" fill="#818CF8"/>
                </svg>
            </div>
        </div>

        <div class="split-right">
            <div class="auth-box">
                <h2>Create Account</h2>
                <p>Please complete your profile to continue</p>
                <form id="registerForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="fullName" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" required placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="password" required placeholder="••••••••">
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="phone" required placeholder="123-456-7890">
                        </div>
                        <div class="form-group">
                            <label>Register As</label>
                            <select id="role">
                                <option value="patient">Patient</option>
                                <option value="doctor">Doctor</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select id="gender">
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem;">Create Account</button>
                    <div id="formMessage" style="text-align: center; margin-top: 1rem; display: none;"></div>
                    <p style="text-align: center; margin-top: 1.5rem; color: var(--gray-500);">
                        Already have an account? <a href="login.html" style="color: var(--pat-primary); font-weight: 600; text-decoration: none;">Login here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                role: document.getElementById('role').value,
                gender: document.getElementById('gender').value,
                dob: document.getElementById('dob').value,
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                const msgDiv = document.getElementById('formMessage');
                if (response.ok) {
                    msgDiv.textContent = 'Registration successful! Redirecting...';
                    msgDiv.style.color = 'green';
                    msgDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1000);
                } else {
                    msgDiv.textContent = result.error || 'Registration failed';
                    msgDiv.style.color = 'red';
                    msgDiv.style.display = 'block';
                }
            } catch (error) {
                const msgDiv = document.getElementById('formMessage');
                msgDiv.textContent = 'Server error occurred.';
                msgDiv.style.color = 'red';
                msgDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
