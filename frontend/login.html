<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DocBridge</title>
    <meta name="description" content="Login to DocBridge — Manage your health appointments and connect with verified doctors online.">
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563EB'/><path d='M16 7v18M7 16h18' stroke='white' stroke-width='4' stroke-linecap='round'/></svg>">
</head>
<body>
    <div class="split-layout">
        <div class="split-left">
            <div class="blob" style="width: 400px; height: 400px; background: #60A5FA; top: -10%; right: -10%;"></div>
            <div class="blob" style="width: 300px; height: 300px; background: #818CF8; bottom: -5%; left: 0%;"></div>
            <div class="split-left-inner">
                <h1>Welcome Back.</h1>
                <p>Login to your portal to manage your health and appointments seamlessly across devices.</p>
                <svg width="100%" height="250" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-top: 2rem;">
                    <!-- Abstract shield/health logo -->
                    <path d="M200 50 L300 90 V170 C300 230 200 280 200 280 C200 280 100 230 100 170 V90 L200 50 Z" fill="white" fill-opacity="0.2"/>
                    <path d="M170 170 L190 190 L240 130" stroke="white" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>

        <div class="split-right">
            <div class="auth-box">
                <h2>Login</h2>
                <p>Welcome back! Please enter your details.</p>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem;">Sign In</button>
                    <div id="errorMessage" style="color: red; text-align: center; margin-top: 1rem; display: none;"></div>
                    <p style="text-align: center; margin-top: 1.5rem; color: var(--gray-500);">
                        Don't have an account? <a href="register.html" style="color: var(--pat-primary); font-weight: 600; text-decoration: none;">Register here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                const errorDiv = document.getElementById('errorMessage');
                if (response.ok) {
                    errorDiv.style.display = 'none';
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify({ id: result.user.id, fullName: result.user.fullName, role: result.user.role, doctorId: result.user.doctorId || null }));
                    
                    if (result.user.role === 'patient') {
                        window.location.href = 'patient.html';
                    } else if (result.user.role === 'doctor') {
                        window.location.href = 'doctor.html';
                    }
                } else {
                    errorDiv.textContent = result.error || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = 'Server error occurred.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
